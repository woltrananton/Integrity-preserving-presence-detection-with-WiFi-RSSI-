# =====================================================================
# Portainer-stack for IoT-Projekt ML inference
# =====================================================================
# Forenklad version: anvander pre-built Python-image med bind-mount.
# Inga Dockerfile-builds — installerar deps vid forsta startup.
#
# Deploy via Portainer: Stacks -> Add stack -> Web editor -> klistra in
# detta -> Deploy the stack.
# =====================================================================

version: "3.8"

services:
  ml-inference:
    container_name: iot_ml_inference
    image: python:3.12-slim-bookworm
    working_dir: /app
    volumes:
      - /share/ml_inference:/app
    command:
      - sh
      - -c
      - |
        pip install --no-cache-dir \
          scikit-learn==1.5.2 \
          numpy==2.0.2 \
          joblib==1.4.2 \
          fastapi==0.115.0 \
          'uvicorn[standard]==0.32.0' \
        && uvicorn ml_server:app --host 0.0.0.0 --port 8765
    ports:
      - "8765:8765"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
